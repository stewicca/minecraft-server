services:
    minecraft-server:
        image: itzg/minecraft-server:${TAG}
        container_name: minecraft-server
        restart: always
        environment:
            EULA: "TRUE"
            TYPE: PAPER
            FORCE_GAMEMODE: "TRUE"
            TZ: "${TIMEZONE}"
            VERSION: "${VERSION}"
            SERVER_NAME: "${SERVER_NAME}"
            MOTD: "${MOTD}"
            MAX_PLAYERS: ${MAX_PLAYERS}
            SEED: ${SEED}
            DIFFICULTY: "${DIFFICULTY}"
            MODE: ${MODE}
            ONLINE_MODE: "${ONLINE_MODE}"
            ENFORCE_WHITELIST: "${ENFORCE_WHITELIST}"
            WHITELIST: "${WHITELIST}"
            ENABLE_AUTOPAUSE: "${ENABLE_AUTOPAUSE}"
            SPAWN_PROTECTION: "${SPAWN_PROTECTION}"
            PVP: "${PVP}"
            INIT_MEMORY: "${INIT_MEMORY}"
            MAX_MEMORY: "${MAX_MEMORY}"
            ENABLE_RCON: "TRUE"
            RCON_PORT: 25575
            RCON_PASSWORD: "${RCON_PASSWORD}"
        ports:
            - ${BEDROCK_PORT}:19132/udp
            - ${JAVA_PORT}:25565/tcp
        volumes:
            - ./data:/data
        networks:
            - minecraft-network

    rcon-web-admin:
        image: itzg/rcon
        container_name: minecraft-rcon
        restart: always
        environment:
            RWA_USERNAME: "${RCON_WEB_USER}"
            RWA_PASSWORD: "${RCON_WEB_PASSWORD}"
            RWA_RCON_HOST: minecraft-server
            RWA_RCON_PORT: 25575
            RWA_RCON_PASSWORD: "${RCON_PASSWORD}"
            RWA_ADMIN: "TRUE"
        ports:
            - ${RCON_WEB_PORT}:4326
            - 4327:4327
        depends_on:
            - minecraft-server
        networks:
            - minecraft-network

    playit:
        image: ghcr.io/playit-cloud/playit-agent:0.17
        container_name: minecraft-playit
        restart: always
        network_mode: host
        environment:
            SECRET_KEY: "${PLAYIT_SECRET}"

networks:
    minecraft-network:
        name: minecraft-network
        driver: bridge
